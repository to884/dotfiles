# ============================================================================
# Starship 設定ファイル
# ============================================================================
#
# このファイルは Starship プロンプトのカスタマイズ設定です
# 公式ドキュメント: https://starship.rs/config/
#
# 設定を変更した後、新しいシェルセッションを開始するか、
# source ~/.bashrc を実行してください
#
# ============================================================================

# エディターの補完を設定スキーマに合わせて取得
"$schema" = 'https://starship.rs/config-schema.json'

# シェルのプロンプトの間に空行を挿入する
add_newline = true

# 全体設定
# <未使用>
# $fossil_branch\
# $fossil_metrics\
# $hg_branch\
# $git_commit\
# $git_state\
# $git_metrics\
# $pijul_channel\
