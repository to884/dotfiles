# $fennel\
# $gleam\
# $guix_shell\
# $haskell\
# $haxe\
# $helm\
# $java\
# $julia\
# $kotlin\
# $gradle\
# $lua\
# $nim\
# $ocaml\
# $opa\
# $perl\
# $php\
# $pulumi\
# $purescript\
# $quarto\
# $raku\
# $rlang\
# $red\
# $ruby\
# $rust\
# $scala\
# $solidity\
# $swift\
# $terraform\
# $typst\
# $vlang\
# $vagrant\
# $zig\
# $buf\
# $nix_shell\
# $conda\
# $meson\
# $spack\
# $nats\
# $direnv\
# $env_var\
# $crystal\
# $custom\
# $cmd_duration\
# $line_break\
# $jobs\
# $status\
# $container\
# </未使用>
format = """
[╭](fg:#778997)[$fill](fg:#bdbdbd)
[│](fg:#778997)($os)($sudo)($username)\
($hostname)\
( $localip)\
( $shlvl)\
( $singularyity)\
( $kubernetes)\
( $vcsh)\
( $memory_usage)( $battery)( $aws)( $azure)( $gcloud)( $openstack)( $c)( $dotnet)( $rust)( $python)( $nodejs)( $golang)( $docker_context)
[ ](fg:#174276 bg:#174276)[ ](bg:#174276)[$directory](bg:#174276)[\uE0B0](fg:#174276 bg:#0C5DA5)$git_branch[\uE0B0](fg:#0C5DA5 bg:#0078D4)[$git_status](green bg:#0078D4)[\uE0B0](fg:#0078D4 bg:#3393DD)$time[\uE0B0](fg:#3393DD bg:none)
[╰](fg:#778997)$shell$character """

# プロンプトの右側（オプション）
# right_format = "$time"

# 継続行のプロンプト
continuation_prompt = "[∙](bright-black) "

# タイムアウト設定（ミリ秒）
scan_timeout = 30
command_timeout = 500

[aws]
symbol = "[](fg:#F0861E)"
format = '[on](fg:#9DCBEF) [$symbol ($profile )(\($region\) )(\[$duration\])]($style)'
style = "fg:#A65117"
disabled = false

[azure]
format = "[on](fg:#9DCBEF) [$symbol( $subscription)]($style)"
symbol = "[](fg:#0078D4)"
style = "fg:#599CE4"
disabled = false

[[battery.display]]
threshold = -1
style = "bold blue"
charging_symbol = "[⚡](fg:yellow)"
discharging_symbol = "💦"

[battery]
full_symbol = "[ ](fg:green)"
charging_symbol = "[ ](fg:green)"
discharging_symbol = "[💦](fg:yellow)"
unknown_symbol = "[ ](fg:gray)"
empty_symbol = "[ ](fg:red)"
format = "[$symbol:$persentage](fg:#0C5DA5)"
disabled = false

[c]
disabled = false

[character]
format = "$symbol"
success_symbol = "[➡](bold fg:#00ff00)"
error_symbol = "[](bold fg:#ff0000)"

[directory]
home_symbol = "🏠"
truncation_symbol = "…/"
read_only = " "
read_only_style = "fg:#fbbc05 bg:#174276"
repo_root_style = "fg:#ffffff bg:#174276"
repo_root_format="󰊢 [$before_root_path]($style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
style = "bg:#174276 fg:white"
use_os_path_sep = true
format = "[AA](fg:#ffffff bg:#174276) [$path]($style)[$read_only]($read_only_style) "

[docker_context]
symbol = ""
disabled = false

[dotnet]
symbol = "[](fg:#9DCBEF bold)"
style = "fg:#0078D4"
format = "[$symbol ($version )([什](fg:#9DCBEF) $tfm)]($style)"

[fill]
symbol = "─"
style = "fg:#778997"

[git_branch]
format = "[ $symbol $branch ]($style)"
style = "bg:#0C5DA5 fg:white"
symbol = ""

[git_commit]
style = "bg:#0078D4"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = " PICKING"
style = "bg:#0078D4"

[git_status]
format = "[ $all_status$ahead_behind ]($style)"
style = "bg:#0078D4"
conflicted = "[ ](fg:#ea4353 bg:#0078D4)"
ahead = "⬆${count}"
behind = "⬇${count}"
diverged = "↕⬆${ahead_count}⬇${behind_count} "
untracked = "[ ](fg:#ffffff bg:#0078d4 bold)"
stashed = " "
modified = "󱈸 "
staged = '[( \($count\)) ](fg:#ffffff bg:#0078D4 bold)'
up_to_date = "[ ](fg:#ffffff bg:#0078D4)"
renamed = "󰑕 "
deleted = " "

[hostname]
ssh_only = false
ssh_symbol = "🌐 "
trim_at = ""
style = "bold fg:#0078D4"
format = "[(@$hostname) $ssh_symbol]($style)"
disabled = false

[localip]
ssh_only = false
format = "[󰌗](fg:#9DCBEF) [$localipv4](fg:#0078D4)"
disabled = false

[memory_usage]
format = "[$symbol](fg:#9DCBEF) [$ram](fg:#599CE4)( [|](fg:#9DCBEF) [$swap](fg:#0078D4))($style)"
threshold = -1
symbol = "󰍛"
style = "fg:#9DCBEF"
disabled = false

[os]
disabled = false
format = " $symbol"

[os.symbols]
Ubuntu = "[](fg:#E95420)"
Windows = "[](fg:#0078D4)"
Macos = "[](fg:#999999)"
Debian = "[](fg:#A81D33)"
Fedora = "[󰌽](fg:#294172)"
Arch = "[󰣇](fg:#1793D1)"

[package]
style = "#ffc0cb"
symbol = "📦"

[shell]
bash_indicator = "[bash ](fg:#2aa198 bold)"
fish_indicator = "fish "
zsh_indicator = "zsh  "
powershell_indicator = "[pwsh ](fg:#0078D4 bold) "
ion_indicator = "ion  "
elvish_indicator = "elvsh "
tcsh_indicator = "tcsh "
xonsh_indicator = "xonsh "
cmd_indicator = "cmd "
nu_indicator = "nush "
unknown_indicator = "??? "
format = "[$indicator]($style)"
style = "bold"
disabled = false

[time]
disabled = false
format = "[  $time ]($style)"
style = "bg:#3393DD fg:white"

[sudo]
format = " $symbol"
disabled = false
symbol = "🦸"

[username]
style_root = ""
style_user = "[](bold fg:#3393DD)"
show_always = true
format = " [$user](fg:#9DCBEF)"
disabled = false

# コマンド実行時間
[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
style = "bold yellow"

# Python
[python]
format = '[ ${symbol} ${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = "󰌠"
style = "fg:#ffd343"
pyenv_version_name = false
detect_extensions = ["py"]
detect_files = [".python-version", "Pipfile", "__pycache__", "pyproject.toml", "requirements.txt", "setup.py", "tox.ini"]
detect_folders = []

# Node.js
[nodejs]
format = "via [$symbol($version )]($style)"
symbol = ""
style = "bold green"
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

# Rust
[rust]
format = "via [$symbol($version )]($style)"
symbol = ""
style = "bold red"

# Kubernetes
[kubernetes]
format = 'on [ $context\($namespace\)]($style) '
style = "cyan bold"
disabled = false
